services:
  db:
    image: postgres:16-alpine
    container_name: clinicsay-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clinicsay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - clinicsay-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clinicsay-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/clinicsay?schema=public
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && node dist/main.js"
    networks:
      - clinicsay-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clinicsay-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - clinicsay-network

networks:
  clinicsay-network:
    driver: bridge

volumes:
  postgres_data:
